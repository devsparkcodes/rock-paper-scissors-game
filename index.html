<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="h1-head">
        <h1>Rock Paper Scissors</h1>
    </div>

    <div class="main-container">
        <div class="outer-game">
            <div class="img-outer">
                <div class="img" id="rock"><img src="./images/rock.png" alt="rock"></div>
                <div class="img" id="paper"><img src="./images/paper.png" alt="paper"></div>
                <div class="img" id="scissors"><img src="./images/scissors.png" alt="scissors"></div>
            </div>

            <div class="score-board">
                <div class="score">
                    <p class="user-score">0</p>
                    <p>You</p>
                </div>
                <div class="score">
                    <p class="comp-score">0</p>
                    <p>Comp</p>
                </div>
            </div>

            <div class="winner-pera">
                <div class="result-pera">Play your move</div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
